  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0f172a;
      --indigo:  #4f46e5;
      --ind2:    #3730a3;
      --bg:      #f1f5f9;
      --white:   #ffffff;
      --row-alt: #f8fafc;
      --row-hl:  #eef2ff;
      --text:    #0f172a;
      --muted:   #64748b;
      --border:  #e2e8f0;
      --live:    #dc2626;
      --fin:     #64748b;
      --hdr:     52px;
      --nav:     42px;
    }

    body {
      font-family: 'M PLUS 1p', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #c8e6f7 0%, #dff0f8 35%, #cceef5 70%, #d4eef9 100%);
      background-attachment: fixed;
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    #topbar {
      background: var(--navy);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: var(--hdr);
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .site-title {
      font-size: 17px; font-weight: 800; letter-spacing: -.4px;
      display: flex; align-items: center; gap: 9px;
      font-family: 'BIZ UDPGothic', sans-serif;
    }
    .site-title em { font-style: normal; }
    .site-logo {
      width: 30px; height: 30px; flex-shrink: 0;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.4));
    }
    .hright { display: flex; align-items: center; gap: 10px; }
    #lastUpdated { font-size: 11px; color: #64748b; white-space: nowrap; transition: color .4s; }
    #lastUpdated.fresh { color: #6ee7b7; }
    #clock { font-size: 12px; color: #94a3b8; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .hbtn {
      background: none; border: 1px solid #334155; color: #94a3b8;
      width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
      font-size: 15px; display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s;
    }
    .hbtn:hover { border-color: #a5b4fc; color: #a5b4fc; }
    #reloadBtn.spin { animation: turn .6s linear infinite; }
    @keyframes turn { to { transform: rotate(360deg); } }

    /* ─── Page nav ─── */
    #pageNav {
      background: var(--navy);
      display: flex;
      padding: 0 20px;
      border-top: 1px solid #1e293b;
      position: sticky;
      top: var(--hdr);
      z-index: 29;
      height: var(--nav);
    }
    .pnav {
      padding: 0 16px;
      height: 100%;
      display: flex;
      align-items: center;
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      background: none;
      border-top: none; border-left: none; border-right: none;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .pnav:hover  { color: #a5b4fc; }
    .pnav.active { color: #fff; border-bottom-color: var(--indigo); font-weight: 700; }

    /* ─── Secondary filter bar ─── */
    .filter-bar {
      background: rgba(200,234,252,0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(186,230,253,0.6);
      display: flex;
      gap: 4px;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
      position: sticky;
      top: calc(var(--hdr) + var(--nav));
      z-index: 28;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    /* ─── Dropdown (country / league / scorers) ─── */
    #countryTriggerBtn, #leagueTriggerBtn, #scorersTriggerBtn {
      background: none; border: 1.5px solid var(--indigo); cursor: pointer;
      padding: 4px 12px; border-radius: 14px;
    }
    #countryDropdownOverlay, #leagueDropdownOverlay, #scorersDropdownOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.25); z-index: 200; display: none;
    }
    #countryDropdownMenu, #leagueDropdownMenu, #scorersDropdownMenu {
      position: absolute; top: calc(var(--hdr) + var(--nav) + 8px); left: 16px;
      background: #fff; border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,.2); overflow: hidden; min-width: 160px;
    }
    .country-opt {
      display: block; width: 100%; padding: 13px 20px;
      font-size: 14px; font-weight: 500; text-align: left;
      background: none; border: none; border-top: 1px solid var(--border);
      cursor: pointer; color: var(--text);
    }
    .country-opt:first-child { border-top: none; }
    .country-opt.active { color: var(--indigo); font-weight: 700; }

    .ftab {
      flex-shrink: 0;
      padding: 10px 14px 9px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      background: none;
      border-top: none; border-left: none; border-right: none;
      transition: color .15s, border-color .15s;
    }
    .ftab:hover  { color: var(--indigo); }
    .ftab.active { color: var(--indigo); border-bottom-color: var(--indigo); font-weight: 700; }

    /* ─── Content wrapper ─── */
    .wrap { max-width: 960px; margin: 0 auto; padding: 20px 16px 56px; }

    /* ─── Section header ─── */
    .sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .sec-title { font-size: 13px; font-weight: 700; color: var(--indigo); text-transform: uppercase; letter-spacing: .5px; }
    .sec-cnt { font-size: 11px; background: #e0e7ff; color: var(--indigo); padding: 1px 8px; border-radius: 10px; font-weight: 600; }
    .sec-range { font-size: 12px; color: var(--muted); margin-left: auto; }

    /* ─── Common table ─── */
    .tbl { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); margin-bottom: 20px; }
    .tbl thead tr { background: #e8eaf6; }
    .tbl thead th { padding: 7px 10px; font-size: 11px; font-weight: 700; color: #3730a3; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
    .tbl thead th.l { text-align: left; }
    .tbl thead th.c { text-align: center; }
    .tbl thead th.r { text-align: right; }
    .tbl tbody tr { border-top: 1px solid var(--border); }
    .tbl tbody tr:nth-child(even) { background: var(--row-alt); }
    .tbl.sched { font-family: 'BIZ UDPMincho', serif; background: rgba(180,225,248,0.35); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(186,230,253,0.55); box-shadow: 0 4px 28px rgba(8,145,178,0.13), inset 0 1px 0 rgba(255,255,255,0.5); border-collapse: separate; border-spacing: 0 3px; }
    .tbl.sched tbody tr:not(.drow) td { background: rgba(255,255,255,0.62); }
    .tbl.sched td { border-top: 1.5px solid rgba(10,40,80,0.42); border-bottom: 1.5px solid rgba(10,40,80,0.42); }
    .tbl.sched td:first-child { border-left: 1.5px solid rgba(10,40,80,0.42); border-radius: 6px 0 0 6px; }
    .tbl.sched td:last-child  { border-right: 1.5px solid rgba(10,40,80,0.42); border-radius: 0 6px 6px 0; }
    .tbl.sched th { border: none; background: rgba(147,210,240,0.45); }
    .tbl.sched tbody tr:nth-child(even):not(.drow) td { background: rgba(225,242,252,0.65); }
    .tbl.sched tr.drow td { background: rgba(8,145,178,0.28) !important; color: #083d5e !important; border: none !important; letter-spacing: 0.4px !important; font-weight: 800 !important; }

    /* ─── Schedule ─── */
    .tbl.sched tbody tr:hover { background: var(--row-hl); }
    .tbl.sched td { padding: 8px 10px; vertical-align: middle; }
    .tbl tr.drow td { background: #f0f4ff; padding: 5px 10px; font-size: 11px; font-weight: 700; color: #4338ca; border-top: 2px solid #c7d2fe; }
    .tbl tr.drow:first-child td { border-top: none; }
    .th-time { width: 72px; }
    .th-score { width: 66px; }
    .th-comp { max-width: 140px; }
    .td-time { width: 72px; text-align: center; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .t-pre  { display: inline-block; font-size: 14px; font-weight: 700; color: #fff; font-family: 'BIZ UDPMincho', serif; background: rgba(10,40,80,0.55); border-radius: 6px; padding: 2px 7px; text-shadow: none; }
    .t-pre.late { color: #fff; background: rgba(4,120,87,0.75); }
    .t-fin  { font-size: 12px; font-weight: 500; color: var(--fin); }
    .t-live { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 800; color: var(--live); }
    .live-dot { width: 12px; height: 12px; background: var(--live); border-radius: 50%; animation: blink 1s ease-in-out infinite; flex-shrink: 0; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
    .tbl.sched tr.live-row { background: #fff0f0 !important; }
    .tbl.sched tr.live-row .score-num { color: var(--live); }
    .td-home { text-align: right; padding-right: 4px; font-size: 13px; font-weight: 500; }
    .td-away { text-align: left;  padding-left:  4px; font-size: 13px; font-weight: 500; }
    .tn { color: #0369a1; font-weight: 700; }
    .team-inner { display: inline-flex; align-items: center; gap: 6px; }
    .td-home .team-inner { flex-direction: row-reverse; }
    .badge { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
    .td-score { width: 66px; text-align: center; font-variant-numeric: tabular-nums; }
    .score-inner { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .score-num { font-size: 16px; font-weight: 800; }
    .score-vs  { font-size: 12px; font-weight: 600; color: var(--muted); }
    .td-comp { max-width: 140px; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    #scorersPage { font-family: 'BIZ UDPMincho', serif; }

    /* ─── Standings ─── */
    .tbl.stnd td { padding: 6px 8px; vertical-align: middle; }
    .zone-bar { width: 4px !important; padding: 0 !important; }
    .stnd-rank { width: 28px; text-align: center; font-size: 13px; font-weight: 700; color: var(--muted); }
    .stnd-team { font-size: 13px; font-weight: 500; white-space: nowrap; }
    .stnd-team-inner { display: flex; align-items: center; gap: 6px; }
    .stnd-badge { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
    .stnd-num { width: 30px; text-align: center; font-size: 13px; font-variant-numeric: tabular-nums; }
    .scorer-sub-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .scorer-sub { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--muted); }
    .scorer-sub.active { background: var(--indigo); color: #fff; border-color: var(--indigo); }
    .stnd-w   { color: #16a34a; font-weight: 700; }
    .stnd-d   { color: #94a3b8; font-weight: 600; }
    .stnd-l   { color: #ef4444; font-weight: 700; }
    .stnd-pts { width: 42px; text-align: center; font-size: 14px; font-weight: 800; color: var(--indigo); font-variant-numeric: tabular-nums; }
    .stnd-gd  { width: 42px; text-align: center; font-size: 12px; font-variant-numeric: tabular-nums; }
    /* ─── Bubbles ─── */
    @keyframes riseUp {
      0%   { transform: translateY(0) scale(1); opacity: 0.7; }
      80%  { opacity: 0.4; }
      100% { transform: translateY(-105vh) scale(1.15); opacity: 0; }
    }
    #bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bubble { position: absolute; bottom: -60px; border-radius: 50%; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.45); animation: riseUp linear infinite; }
    #schedulePage, #standingsPage, #scorersPage, #editPage { position: relative; z-index: 1; }
    .stnd-legend { display: flex; flex-wrap: wrap; gap: 6px 14px; padding: 8px 0 12px; font-size: 11px; color: var(--muted); }
    .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

    /* ─── Scorers ─── */
    .scorers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 700px) { .scorers-grid { grid-template-columns: 1fr; } }
    .scorer-subtitle {
      font-size: 12px; font-weight: 700; color: var(--indigo);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 8px; padding: 0 2px;
    }
    .player-inner { display: inline-flex; align-items: center; gap: 8px; }
    .player-hs { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #e2e8f0; }
    .stat-val { width: 42px; text-align: center; font-size: 15px; font-weight: 800; color: var(--indigo); font-variant-numeric: tabular-nums; }

    /* ─── Knockout list (フォールバック) ─── */
    .ko-round { margin-bottom: 20px; }
    .ko-round-head {
      font-size: 13px; font-weight: 800; color: var(--indigo);
      text-transform: uppercase; letter-spacing: .4px;
      padding: 10px 0 6px; border-bottom: 2px solid var(--indigo);
      margin-bottom: 10px;
    }
    .ko-tie {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 8px; overflow: hidden;
    }
    .ko-leg {
      display: flex; align-items: center;
      padding: 9px 14px; gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .ko-leg:last-of-type { border-bottom: none; }
    .ko-leg-num {
      font-size: 10px; font-weight: 700; color: var(--muted);
      min-width: 36px; flex-shrink: 0;
    }
    .ko-team { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
    .ko-team.right { text-align: right; }
    .ko-team.winner { font-weight: 800; color: var(--indigo); }
    .ko-score-box {
      display: flex; align-items: center; gap: 4px;
      font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums;
      color: var(--text); min-width: 52px; justify-content: center; flex-shrink: 0;
    }
    .ko-score-sep { font-weight: 400; color: var(--muted); }
    .ko-agg {
      padding: 5px 14px; font-size: 11px; color: var(--muted);
      background: var(--row-alt); border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .ko-agg-winner { font-weight: 700; color: var(--indigo); }
    .ko-note { font-size: 11px; color: var(--muted); font-style: italic; }

    /* ─── Tournament Bracket (SVG connector) ─── */
    .bracket-outer { overflow-x: auto; padding: 8px 0 20px; -webkit-overflow-scrolling: touch; }
    .bracket-wrap { position: relative; display: flex; align-items: flex-start; }
    .bc-half { display: flex; flex: 1; align-items: flex-start; }
    .bc-col {
      display: flex; flex-direction: column;
      width: 116px; flex-shrink: 0; padding: 0 5px;
    }
    .bc-spacer { flex-shrink: 0; }
    .bc-match {
      display: flex; flex-direction: column;
      border-radius: 5px; overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.08); flex-shrink: 0;
    }
    .bc-team {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 7px; background: var(--white); border: 1px solid var(--border);
      font-size: 11px; line-height: 1.2; height: 28px;
      white-space: nowrap; overflow: hidden;
    }
    .bc-team + .bc-team { border-top: none; }
    .bc-team.bc-w  { background: #eef2ff; border-color: #818cf8; font-weight: 700; color: var(--indigo); }
    .bc-team.bc-ch { background: #fef9c3; border-color: #eab308; font-weight: 800; color: #92400e; }
    .bc-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .bc-sc { font-size: 10px; color: var(--muted); flex-shrink: 0; padding-left: 4px; font-variant-numeric: tabular-nums; }
    .bc-lbl {
      text-align: center; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .4px; color: var(--muted);
      padding: 4px 0 5px; height: 22px; flex-shrink: 0;
    }
    .bc-final-col {
      display: flex; flex-direction: column; align-items: center;
      width: 116px; flex-shrink: 0; padding: 0 5px;
    }
    .bc-trophy { font-size: 18px; text-align: center; padding: 2px 0; }
    .bc-champ-name { font-size: 10px; font-weight: 700; color: #92400e; text-align: center; padding: 1px 0; }
    .bc-svg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: visible;
    }

    /* ─── PIN dialog ─── */
    #pinDialog {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: none; align-items: center; justify-content: center; z-index: 200;
    }
    #pinDialog.open { display: flex; }
    #pinBox {
      background: var(--white); border-radius: 12px; padding: 28px 24px;
      min-width: 240px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    #pinBox h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    #pinInput {
      display: block; width: 100%; text-align: center; letter-spacing: 6px;
      font-size: 22px; padding: 10px; border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 6px; font-family: monospace;
    }
    #pinInput:focus { border-color: var(--indigo); outline: none; }
    #pinError { font-size: 12px; color: #ef4444; min-height: 18px; margin-bottom: 10px; }
    .pin-btns { display: flex; gap: 8px; }
    .pin-ok { flex: 1; padding: 9px; background: var(--indigo); color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .pin-cancel { padding: 9px 14px; background: none; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; cursor: pointer; color: var(--muted); }

    /* ─── Admin mode ─── */
    #adminBadge {
      display: none; font-size: 10px; font-weight: 700; letter-spacing: .4px;
      background: #f59e0b; color: #fff; padding: 2px 8px; border-radius: 10px;
    }
    body.admin-mode #adminBadge { display: inline-block; }
    .admin-name {
      cursor: pointer; border-bottom: 1px dashed #f59e0b;
      transition: color .1s;
    }
    .admin-name:hover { color: #d97706; }
    #adminPopup {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    #adminPopup.open { display: flex; }
    #adminPopupBox {
      background: var(--white); border-radius: 10px; padding: 20px 24px;
      min-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    #adminPopupLabel { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    #adminPopupEn { font-size: 12px; color: var(--muted); margin-bottom: 10px; word-break: break-all; }
    .admin-inp-row { display: flex; gap: 6px; margin-bottom: 12px; }
    #adminPopupInput {
      flex: 1; padding: 8px 10px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 14px;
    }
    #adminPopupInput:focus { border-color: var(--indigo); outline: none; }
    #adminWikiBtn {
      padding: 0 10px; background: none; border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap;
      color: var(--muted); transition: border-color .15s, color .15s;
    }
    #adminWikiBtn:hover { border-color: var(--indigo); color: var(--indigo); }
    #adminWikiStatus { font-size: 11px; color: var(--muted); margin-bottom: 8px; min-height: 16px; }
    .admin-popup-btns { display: flex; gap: 8px; justify-content: flex-end; }
    /* 名前編集ページのWikiボタン */
    .wiki-btn {
      padding: 2px 7px; font-size: 11px; background: none;
      border: 1px solid var(--border); border-radius: 4px;
      cursor: pointer; color: var(--muted); flex-shrink: 0;
    }

      display: block; width: 100%; padding: 8px 12px; margin-bottom: 8px;

      text-align: left; padding: 7px 10px;
      background: var(--row-alt); border-bottom: 2px solid var(--border);
      font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .4px;
      position: sticky; top: calc(var(--hdr) + var(--nav));
    }
    .edit-tbl td { padding: 4px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .edit-tbl td:first-child { color: var(--muted); font-size: 12px; width: 50%; }
    .edit-inp {
      width: 100%; padding: 4px 8px; border: 1px solid var(--border);
      border-radius: 4px; font-size: 13px; font-family: inherit;
      background: var(--white); color: var(--text);

    .edit-saved { font-size: 13px; color: #10b981; margin-top: 8px; min-height: 20px; }

    .state { text-align: center; padding: 60px 16px; color: var(--muted); }
    .state .ico { font-size: 32px; display: block; margin-bottom: 10px; }

    @media (max-width: 640px) {
      .hide-sm { display: none; }
      /* ヘッダーを画面幅に固定（テーブルが広くても崩れない） */
      #topbar  { position: fixed; top: 0; left: 0; right: 0; transition: transform .3s ease; }
      #pageNav { position: fixed; top: var(--hdr); left: 0; right: 0; transition: transform .3s ease; }
      body.header-hidden #topbar  { transform: translateY(calc(-1 * var(--hdr))); }
      body.header-hidden #pageNav { transform: translateY(calc(-1 * (var(--hdr) + var(--nav)))); }
      #schedulePage, #standingsPage, #scorersPage, #editPage {
        padding-top: calc(var(--hdr) + var(--nav));
      }
      /* 試合日程 */
      #scheduleWrap { padding-left: 2px; padding-right: 2px; }

      .th-time  { width: 38px; }

      .td-comp  { width: 40px; max-width: 40px; font-size: 10px; padding: 4px 0; color: var(--text); font-weight: 600; border-left: 2px solid #94a3b8 !important; }
      .td-home, .td-away { font-size: 14px; padding: 4px 0; overflow: hidden; }
      .team-inner { display: flex; width: 100%; overflow: hidden; }
      .tn { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .t-pre { font-size: 14px; }
      .score-num { font-size: 13px; line-height: 1.15; }
      .score-vs  { color: #94a3b8; font-weight: 600; font-size: 11px; line-height: 1.15; }

</head>

/* 英語名 → カタカナ 自動変換（マップ未登録時のフォールバック） */
function nameToKatakana(name) {
  if (!name || /[぀-ヿ一-鿿]/.test(name)) return name;
  let s = name.normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/ñ/g,'n').replace(/[çć]/g,'s').replace(/[øö]/g,'o')
    .replace(/ß/g,'ss').replace(/š/g,'sh').replace(/č/g,'ch')
    .replace(/ž/g,'j').replace(/ğ/g,'g').replace(/ı/g,'i')
    .replace(/ř/g,'r').replace(/ď/g,'d').replace(/ť/g,'t')
    .replace(/ő/g,'o').replace(/ű/g,'u').replace(/ã/g,'a');
  return s.split(/[\s\-–—·]+/).filter(Boolean).map(word => {
    const w = word.toLowerCase().replace(/[^a-z]/g,'');
    if (!w) return word;
    const isV = c => 'aeiou'.includes(c);
    const CV = {
      'ka':'カ','ki':'キ','ku':'ク','ke':'ケ','ko':'コ','kya':'キャ','kyu':'キュ','kyo':'キョ',
      'sa':'サ','si':'シ','su':'ス','se':'セ','so':'ソ',
      'sha':'シャ','shi':'シ','shu':'シュ','she':'シェ','sho':'ショ',
      'ta':'タ','ti':'ティ','tu':'トゥ','te':'テ','to':'ト',
      'chi':'チ','cha':'チャ','chu':'チュ','che':'チェ','cho':'チョ','tsu':'ツ',
      'na':'ナ','ni':'ニ','nu':'ヌ','ne':'ネ','no':'ノ',
      'ha':'ハ','hi':'ヒ','hu':'フ','he':'ヘ','ho':'ホ',
      'fa':'ファ','fi':'フィ','fu':'フ','fe':'フェ','fo':'フォ',
      'ma':'マ','mi':'ミ','mu':'ム','me':'メ','mo':'モ',
      'ya':'ヤ','yi':'イ','yu':'ユ','ye':'イェ','yo':'ヨ',
      'ra':'ラ','ri':'リ','ru':'ル','re':'レ','ro':'ロ',
      'la':'ラ','li':'リ','lu':'ル','le':'ル','lo':'ロ',
      'wa':'ワ','wi':'ウィ','wu':'ウ','we':'ウェ','wo':'ヲ',
      'ga':'ガ','gi':'ギ','gu':'グ','ge':'ゲ','go':'ゴ','gya':'ギャ','gyu':'ギュ','gyo':'ギョ',
      'za':'ザ','zi':'ジ','zu':'ズ','ze':'ゼ','zo':'ゾ',
      'ja':'ジャ','ji':'ジ','ju':'ジュ','je':'ジェ','jo':'ジョ',
      'da':'ダ','di':'ディ','du':'ドゥ','de':'デ','do':'ド',
      'ba':'バ','bi':'ビ','bu':'ブ','be':'ベ','bo':'ボ',
      'pa':'パ','pi':'ピ','pu':'プ','pe':'ペ','po':'ポ',
      'va':'ヴァ','vi':'ヴィ','vu':'ヴ','ve':'ヴェ','vo':'ヴォ',
      'ca':'カ','ci':'シ','cu':'ク','ce':'セ','co':'コ',
      'xa':'シャ','xi':'シ','xu':'シュ','xe':'シェ','xo':'ショ',
      'a':'ア','i':'イ','u':'ウ','e':'エ','o':'オ',
    };
    const SC = {'b':'ブ','c':'ク','d':'ド','f':'フ','g':'グ','h':'','j':'ジ','k':'ク',
                'l':'ル','m':'ム','n':'ン','p':'プ','q':'ク','r':'ル','s':'ス','t':'ト',
                'v':'ヴ','w':'ウ','x':'クス','y':'イ','z':'ズ'};
    let r = '', i = 0;
    while (i < w.length) {
      const c=w[i], n=w[i+1]||'', n2=w[i+2]||'';
      if (c+n+n2==='tch'){r+='ッチ';i+=3;continue;}
      if (!isV(c)&&c===n&&c!=='n'){r+='ッ';i++;continue;}
      if (c+n==='ph'){r+=isV(n2)?CV['f'+n2]||'フ':'フ';i+=isV(n2)?3:2;continue;}
      if (c+n==='ch'){r+=CV['ch'+n2]||(isV(n2)?CV['ch'+n2]:'チ')||'チ';i+=isV(n2)?3:2;continue;}
      if (c+n==='sh'){r+=CV['sh'+n2]||'シ';i+=isV(n2)?3:2;continue;}
      if (c+n==='th'){r+='ス';i+=2;continue;}
      if (c+n==='gh'&&!isV(n2)){i+=2;continue;}
      if (c+n==='ck'){r+='ク';i+=2;continue;}
      if (c+n==='ng'){r+='ング';i+=2;continue;}
      if (c+n==='qu'){r+=isV(n2)?CV['k'+n2]||'ク':'ク';i+=isV(n2)?3:2;continue;}
      if (c+n==='wh'){r+=isV(n2)?CV['w'+n2]||'ウ':'ウ';i+=isV(n2)?3:2;continue;}
      if ((c+n==='er'||c+n==='ar'||c+n==='or')&&i===w.length-2){r+='ー';i+=2;continue;}
      if (c==='e'&&i===w.length-1&&r.length>0&&!isV(w[i-1]||'')){i++;continue;}
      if (c+n+n2==='eau'){r+='オー';i+=3;continue;}
      if (c+n==='aa'||c+n==='oo'||c+n==='uu'){r+=CV[c]+'ー';i+=2;continue;}
      if (c+n==='ou'){r+='ウ';i+=2;continue;}
      if (c+n==='au'){r+='オ';i+=2;continue;}
      if (c+n==='oi'){r+='ワ';i+=2;continue;}
      if (c+n==='ie'&&!isV(n2)){r+='イ';i+=2;continue;}
      if (c+n==='ie'&&isV(n2)){r+='イエ';i+=2;continue;}
      if (c+n==='ei'){r+='エイ';i+=2;continue;}
      if (c+n==='ay'){r+='エイ';i+=2;continue;}
      if (c+n==='ey'){r+='エイ';i+=2;continue;}
      if (c+n==='gn'&&isV(n2)){r+='ニ';i+=2;continue;}
      if (!isV(c)&&isV(n)){const k=CV[c+n];if(k){r+=k;i+=2;continue;}}
      if (isV(c)){r+=CV[c]||c;i++;continue;}
      r+=SC[c]||c;i++;
    }
    return r||word;
  }).join('・');
}

function getLogo(team) {
  if (!team) return null;
  if (typeof team.logo === 'string' && team.logo) return team.logo;

}

/* ════════════════════════════════════════
   日またぎ時刻
════════════════════════════════════════ */
function getMatchTiming(utcStr) {
  const d = new Date(utcStr);
  const tz = LANG === 'ja' ? 'Asia/Tokyo' : Intl.DateTimeFormat().resolvedOptions().timeZone;
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: tz,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false,
  }).formatToParts(d);
  const get = t => parts.find(p => p.type === t)?.value ?? '00';
  let h = parseInt(get('hour'));
  const m = get('minute');
  if (h === 24) h = 0;
  const localDate = `${get('year')}-${get('month')}-${get('day')}`;
  return { logicalDate: localDate, displayTime: `${String(h).padStart(2,'0')}:${m}`, isLate: false };
}

function dayLabel(dateStr) {
  const tz = LANG === 'ja' ? 'Asia/Tokyo' : Intl.DateTimeFormat().resolvedOptions().timeZone;
  return new Date(dateStr + 'T12:00:00')
    .toLocaleDateString(LANG==='ja'?'ja-JP':'en-US', { timeZone: tz, month: LANG==='ja'?'numeric':'short', day: 'numeric', weekday: 'short' });
}

/* ════════════════════════════════════════
   ① 試合日程 — 取得・描画
════════════════════════════════════════ */
function parseEvent(ev, lg) {
  const comp = ev.competitions?.[0];
  if (!comp) return null;
  const home = comp.competitors?.find(c => c.homeAway === 'home');
  const away = comp.competitors?.find(c => c.homeAway === 'away');
  if (!home || !away) return null;
  let state  = comp.status?.type?.state ?? ev.status?.type?.state ?? 'pre';
  // ESPN APIが誤った'in'状態を返すことがあるため、試合開始の30分前より前ならpreに補正
  if (state === 'in' && ev.date) {
    const minsFromStart = (Date.now() - new Date(ev.date).getTime()) / 60000;
    if (minsFromStart < -30) state = 'pre';
  }
  const timing = getMatchTiming(ev.date);
  return {
    id: ev.id, utcDate: ev.date,
    logicalDate: timing.logicalDate, displayTime: timing.displayTime, isLate: timing.isLate,
    homeTeam: teamNameJa(home.team.displayName || home.team.shortDisplayName || home.team.name),
    awayTeam: teamNameJa(away.team.displayName || away.team.shortDisplayName || away.team.name),
    homeLogo: getLogo(home.team), awayLogo: getLogo(away.team),
    homeScore: (state !== 'pre') ? home.score : null,
    awayScore: (state !== 'pre') ? away.score : null,
    state, clock: comp.status?.displayClock || '',
    label: lg.label, shortLabel: lg.short || lg.label, country: lg.country, leagueColor: lg.color || '#64748b',
  };
}

async function fetchSchedule() {
  const dates = [];
  for (let i = -1; i <= 6; i++) {
    const d = new Date(); d.setUTCDate(d.getUTCDate() + i);
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  }
  const tasks = SCHEDULE_LEAGUES.flatMap(lg =>
    dates.map(date =>
      fetch(`${ESPN_SCHED}/${lg.code}/scoreboard?dates=${date}&limit=100&lang=ja&region=jp`)
        .then(r => r.ok ? r.json() : {events:[]})
        .then(d => (d.events||[]).map(ev => parseEvent(ev,lg)).filter(Boolean))
        .catch(() => [])
    )
  );
  const chunks = await Promise.all(tasks);
  const all = chunks.flat();
  const seen = new Set();
  return all.filter(e => { if (seen.has(e.id)) return false; seen.add(e.id); return true; });
}

  // 終了試合は前日以降のみ表示

  wrap.innerHTML = `

        <th class="l">${T.away}</th>

    </table>

}

function toHalfKana(str) {

function fitTeamName(name) {
  if (LANG !== 'ja') return name;
  if (window.innerWidth >= 600) return name;
  const fw = [...name].filter(c => c.charCodeAt(0) >= 0x30A0 && c.charCodeAt(0) <= 0x30FF).length;
  return fw >= 8 ? toHalfKana(name) : name;
}

async function fetchStandings(code) {

function parseStandings(data) {
  const entries = data.children?.[0]?.standings?.entries || data.standings?.entries || [];
  return entries.map(e => {

    (e.stats||[]).forEach(st => { s[st.name] = st.value; });
    return {
      rank:   Math.round(s.rank||0),
      team:   teamNameJa(e.team?.displayName || e.team?.shortDisplayName || '?'),
      teamEn: e.team?.displayName || e.team?.shortDisplayName || '?',

      gd: Math.round(s.pointDifferential||0), pts: Math.round(s.points||0),

const CUP_KO_CODES = new Set(['uefa.champions','uefa.europa','uefa.europa.conf']);
const koCache = {};

const KO_ROUND_ORDER = ['round-of-32','round-of-16','quarterfinals','semifinals','final'];
const KO_ROUND_JA = {
  'round-of-32':  'ベスト32',
  'round-of-16':  'ベスト16',
  'quarterfinals':'準々決勝',
  'semifinals':   '準決勝',
  'final':        '決勝',
};

/* ラウンド識別（slugが無い場合はイベント名から推定） */
function slugFromEvent(e) {
  if (KO_ROUND_ORDER.includes(e.season?.slug)) return e.season.slug;
  // competition.notes が最も信頼できるラウンド情報源
  const compNotes = (e.competitions?.[0]?.notes || []).map(n => n.text||n.headline||'').join(' ');
  const compType  = e.competitions?.[0]?.type?.text || '';
  const evtNotes  = (e.notes||[]).map(n => n.text||n.headline||'').join(' ');
  const txt = ((e.name||'') + ' ' + compNotes + ' ' + compType + ' ' + evtNotes).toLowerCase();
  // 英語 + 日本語パターン
  if ((/\bfinal\b|決勝/.test(txt)) && !(/semi|quarter|準々|準決/.test(txt))) return 'final';
  if (/semi.?final|semifinal|準決勝/.test(txt))   return 'semifinals';
  if (/quarter.?final|quarterfinal|準々決勝/.test(txt)) return 'quarterfinals';
  if (/round.of.16|last.?16|\br16\b|ベスト16|16強/.test(txt))  return 'round-of-16';
  if (/round.of.32|last.?32|ベスト32|32強/.test(txt))           return 'round-of-32';
  if (e._koGuessed) return e._koGuessed;
  return null;
}

async function fetchKnockoutEvents(code) {
  const season = currentSeason();
  const year   = season + 1;

  const isKO = e => e.competitions?.[0]?.competitors?.length >= 2;

  // 試み① seasontype=3（ノックアウト専用）
  try {
    const r = await fetch(`${ESPN_SCHED}/${code}/scoreboard?seasontype=3&limit=200`);
    if (r.ok) {
      const d = await r.json();
      const evts = (d.events||[]).filter(isKO);
      if (evts.length) return evts;
    }
  } catch {}

  // 試み② 日付範囲クエリ
  try {
    const from = `${year}0101`, to = `${year}0701`;
    const r = await fetch(`${ESPN_SCHED}/${code}/scoreboard?dates=${from}-${to}&limit=500&lang=ja&region=jp`);
    if (r.ok) {
      const d = await r.json();
      const evts = (d.events||[]).filter(e => slugFromEvent(e));
      if (evts.length) return evts;
    }
  } catch {}

  // 試み③ 日付なしクエリ
  try {
    const r = await fetch(`${ESPN_SCHED}/${code}/scoreboard?limit=100&lang=ja&region=jp`);
    if (r.ok) {
      const d = await r.json();
      const evts = (d.events||[]).filter(e => slugFromEvent(e));
      if (evts.length) return evts;
    }
  } catch {}

  // 試み④ 個別日付（火〜木・土）
  const dates = [];
  for (let m = 1; m <= 5; m++) {
    for (let day = 1; day <= 31; day++) {
      const d = new Date(year, m, day);
      if (d.getMonth() !== m) break;
      const dow = d.getDay();
      if (dow === 2 || dow === 3 || dow === 4 || dow === 6)
        dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
    }
  }
  const seen = new Set(), events = [];
  for (let i = 0; i < dates.length; i += 8) {
    const results = await Promise.all(dates.slice(i, i+8).map(async dt => {
      try {
        const r = await fetch(`${ESPN_SCHED}/${code}/scoreboard?dates=${dt}&limit=20&lang=ja&region=jp`);
        return r.ok ? (await r.json()).events || [] : [];
      } catch { return []; }
    }));
    results.flat().forEach(e => {
      if (e.id && !seen.has(e.id) && slugFromEvent(e)) {
        seen.add(e.id); events.push(e);
      }
    });
  }
  return events;
}

function parseKnockoutEvents(events) {
  const rounds = {};
  for (const evt of events) {
    const slug = slugFromEvent(evt);
    if (!slug) continue;
    const comp = evt.competitions?.[0];
    if (!comp) continue;
    const comps = comp.competitors || [];
    if (comps.length < 2) continue;

    const home = comps.find(c => c.homeAway === 'home') || comps[0];
    const away = comps.find(c => c.homeAway === 'away') || comps[1];
    const seriesComps = comp.series?.competitors || [];
    const homeWin = seriesComps.find(s => s.id === home.id)?.winner ?? false;
    const awayWin = seriesComps.find(s => s.id === away.id)?.winner ?? false;
    const key   = [home.id, away.id].sort().join('-');
    const evtId = evt.id || evt.date;   // イベントIDで重複排除（leg番号に頼らない）
    const note  = (comp.notes || []).find(n => n.type === 'event')?.text || '';
    const fin   = ['STATUS_FINAL','STATUS_FULL_TIME'].includes(evt.status?.type?.name);

    if (!rounds[slug]) rounds[slug] = {};
    if (!rounds[slug][key]) {
      rounds[slug][key] = {
        homeId:     home.id,
        awayId:     away.id,
        homeName:   teamNameJa(home.team?.displayName || home.team?.shortDisplayName || '?'),
        awayName:   teamNameJa(away.team?.displayName || away.team?.shortDisplayName || '?'),
        homeNameEn: home.team?.displayName || home.team?.shortDisplayName || '?',
        awayNameEn: away.team?.displayName || away.team?.shortDisplayName || '?',
        homeLogo:   home.team?.logo || null,
        awayLogo:   away.team?.logo || null,
        legs: [], homeWin: false, awayWin: false,
      };
    }
    const tie = rounds[slug][key];
    tie.homeWin = tie.homeWin || homeWin;
    tie.awayWin = tie.awayWin || awayWin;
    // イベントIDで重複チェック（leg番号が全て1でも複数戦を正しく保存）
    if (!tie.legs.find(l => l.evtId === evtId)) {
      tie.legs.push({
        evtId,
        homeScore: fin ? (parseInt(home.score) || 0) : null,
        awayScore: fin ? (parseInt(away.score) || 0) : null,
        fin, note,
        date: evt.date,
      });
    }
  }

  return KO_ROUND_ORDER
    .filter(slug => rounds[slug])
    .map(slug => ({
      slug,
      label: KO_ROUND_JA[slug] || slug,
      ties: Object.values(rounds[slug]).map(t => ({
        ...t,
        // 日付順にソートして第1戦・第2戦を再採番
        legs: t.legs
          .sort((a, b) => new Date(a.date) - new Date(b.date))
          .map((l, i) => ({ ...l, leg: i + 1 })),
      })),
    }));
}

/* ── ノックアウト HTML 生成（文字列を返す） ── */
function buildKnockoutHtml(rounds) {
  if (!rounds.length) return '';

  function teamSpan(nameJa, nameEn) {
    if (adminMode && nameEn)
      return `<span class="admin-name" data-en="${attr(nameEn)}" data-type="team" title="クリックで編集">${esc(nameJa)}</span>`;
    return esc(nameJa);
  }

  let html = `<div class="sec-head" style="margin-top:24px">
    <span class="sec-title">ノックアウトステージ</span>
    <span class="sec-cnt">ベスト16〜</span>
  </div>`;
  for (const round of rounds) {
    html += `<div class="ko-round"><div class="ko-round-head">${esc(round.label)}</div>`;
    for (const tie of round.ties) {
      const legs    = tie.legs;
      const isFinal = round.slug === 'final';
      const winner  = tie.homeWin ? tie.homeName : tie.awayWin ? tie.awayName : null;
      const hSpan   = teamSpan(tie.homeName, tie.homeNameEn);
      const aSpan   = teamSpan(tie.awayName, tie.awayNameEn);
      html += `<div class="ko-tie">`;
      for (const leg of legs) {
        const label  = isFinal ? '決勝' : `第${leg.leg}戦`;
        const hScore = leg.fin && leg.homeScore !== null ? leg.homeScore : '–';
        const aScore = leg.fin && leg.awayScore !== null ? leg.awayScore : '–';
        const hCls   = tie.homeWin ? ' winner' : '';
        const aCls   = tie.awayWin ? ' winner' : '';
        html += `<div class="ko-leg">
          <span class="ko-leg-num">${esc(label)}</span>
          <span class="ko-team${hCls}">${hSpan}</span>
          <span class="ko-score-box">${hScore}<span class="ko-score-sep">-</span>${aScore}</span>
          <span class="ko-team right${aCls}">${aSpan}</span>
        </div>`;
      }
      if (!isFinal && legs.length >= 2 && legs.every(l => l.fin)) {
        const homeAgg = legs.reduce((s,l) => s + (l.homeScore||0), 0);
        const awayAgg = legs.reduce((s,l) => s + (l.awayScore||0), 0);
        const note    = legs[legs.length-1].note;
        html += `<div class="ko-agg">
          <span class="ko-note">${note ? esc(note) : ''}</span>
          <span class="${winner ? 'ko-agg-winner' : ''}">${winner ? esc(winner) + ' が突破' : `${homeAgg} – ${awayAgg}（合計）`}</span>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  return html;
}

/* ════════════════════════════════════════
   トーナメントブラケット描画（SVGライン方式）
════════════════════════════════════════ */
function buildBracketHtml(rounds) {
  _bracketConns = [];
  const get = slug => rounds.find(r => r.slug === slug)?.ties || [];
  const r16 = get('round-of-16');
  const qf  = get('quarterfinals');
  const sf  = get('semifinals');
  const fin = get('final');

  if (!r16.length && !qf.length && !sf.length && !fin.length)
    return `<div class="state"><span class="ico">🏆</span>${LANG==='ja'?'トーナメントデータがありません':'No tournament data'}</div>`;

  // Which columns to show (cascading: showing a later round implies all prior rounds too)
  const showR16 = r16.length > 0;
  const showQF  = showR16 || qf.length > 0;
  const showSF  = showQF  || sf.length > 0;

  // nPS = match slots per side in the first (outermost) column
  const nPS = showR16 ? Math.max(4, Math.ceil(r16.length / 2))
            : showQF  ? Math.max(2, Math.ceil(qf.length / 2))
            : 1;

  // fill: pad array with nulls to length n
  const fill = (arr, n) => { const a = [...arr]; while (a.length < n) a.push(null); return a; };

  // Build each half's column data (nulls for undecided/future matches)
  const lR16 = showR16 ? fill(r16.slice(0, Math.ceil(r16.length / 2)), nPS)            : [];
  const rR16 = showR16 ? fill(r16.slice(Math.ceil(r16.length / 2)),    nPS)            : [];
  const lQF  = showQF  ? fill(qf.slice(0, Math.ceil(qf.length / 2)),   Math.ceil(nPS / 2)) : [];
  const rQF  = showQF  ? fill(qf.slice(Math.ceil(qf.length / 2)),      Math.ceil(nPS / 2)) : [];
  const lSF  = showSF  ? fill(sf.slice(0, 1), 1) : [];
  const rSF  = showSF  ? fill(sf.slice(1, 2), 1) : [];

  const BH     = 56;          // match box height (2 rows × 28px)
  const totalH = nPS * BH;   // total bracket height

  function agg(t) {
    if (!t?.legs.length) return null;
    let h = 0, a = 0, ok = false;
    for (const l of t.legs) { if (l.fin) { h += l.homeScore||0; a += l.awayScore||0; ok = true; } }
    return ok ? {h, a} : null;
  }

  function mHtml(t, bid) {
    if (!t) return `<div class="bc-match" data-bid="${bid}"><div class="bc-team"></div><div class="bc-team"></div></div>`;
    const sc = agg(t);
    const hSc = sc != null ? `<span class="bc-sc">${sc.h}</span>` : '';
    const aSc = sc != null ? `<span class="bc-sc">${sc.a}</span>` : '';
    return `<div class="bc-match" data-bid="${bid}"><div class="bc-team"><span class="bc-name">${esc(t.homeName)}</span>${hSc}</div><div class="bc-team"><span class="bc-name">${esc(t.awayName)}</span>${aSc}</div></div>`;
  }

  function colHtml(matches, bids) {
    const cnt  = matches.length;
    const span = totalH / cnt;
    const hs   = span / 2 - BH / 2;
    const gap  = span - BH;
    let html = `<div class="bc-col">`;
    for (let i = 0; i < cnt; i++) {
      html += `<div class="bc-spacer" style="height:${Math.max(0, i === 0 ? hs : gap)}px"></div>`;
      html += mHtml(matches[i], bids[i]);
    }
    html += `<div class="bc-spacer" style="height:${Math.max(0, hs)}px"></div></div>`;
    return html;
  }

  // Bid (data-bid) arrays — nulls in matches still get a unique bid
  const lR16B = lR16.map((_, i) => `l-r16-${i}`);
  const rR16B = rR16.map((_, i) => `r-r16-${i}`);
  const lQFB  = lQF.map((_,  i) => `l-qf-${i}`);
  const rQFB  = rQF.map((_,  i) => `r-qf-${i}`);
  const lSFB  = lSF.map((_,  i) => `l-sf-${i}`);
  const rSFB  = rSF.map((_,  i) => `r-sf-${i}`);

  // Register bracket connections (SVG lines drawn after DOM insert)
  // Left: R16 → QF → SF → Final
  for (let i = 0; i < lQF.length; i++)
    _bracketConns.push({src1: lR16B[i*2], src2: lR16B[i*2+1], tgt: lQFB[i], side: 'left'});
  for (let i = 0; i < lSF.length; i++)
    _bracketConns.push({src1: lQFB[i*2],  src2: lQFB[i*2+1],  tgt: lSFB[i], side: 'left'});
  if      (lSF.length)  _bracketConns.push({src1: lSFB[0],  src2: null, tgt: 'final', side: 'left'});
  else if (lQF.length)  _bracketConns.push({src1: lQFB[0],  src2: null, tgt: 'final', side: 'left'});
  else if (lR16.length) _bracketConns.push({src1: lR16B[0], src2: null, tgt: 'final', side: 'left'});
  // Right: R16 → QF → SF → Final
  for (let i = 0; i < rQF.length; i++)
    _bracketConns.push({src1: rR16B[i*2], src2: rR16B[i*2+1], tgt: rQFB[i], side: 'right'});
  for (let i = 0; i < rSF.length; i++)
    _bracketConns.push({src1: rQFB[i*2],  src2: rQFB[i*2+1],  tgt: rSFB[i], side: 'right'});
  if      (rSF.length)  _bracketConns.push({src1: rSFB[0],  src2: null, tgt: 'final', side: 'right'});
  else if (rQF.length)  _bracketConns.push({src1: rQFB[0],  src2: null, tgt: 'final', side: 'right'});
  else if (rR16.length) _bracketConns.push({src1: rR16B[0], src2: null, tgt: 'final', side: 'right'});

  // Final column (center)
  const f   = fin[0] || null;
  const sc  = f ? agg(f) : null;
  const hN  = f ? f.homeName : '';
  const aN  = f ? f.awayName : '';
  const hSc = sc != null ? `<span class="bc-sc">${sc.h}</span>` : '';
  const aSc = sc != null ? `<span class="bc-sc">${sc.a}</span>` : '';
  const fhs = Math.max(0, totalH / 2 - BH / 2);
  const finalHtml = `<div class="bc-final-col">
    <div class="bc-spacer" style="height:${fhs}px"></div>
    <div class="bc-match" data-bid="final">
      <div class="bc-team"><span class="bc-name">${esc(hN)}</span>${hSc}</div>
      <div class="bc-team"><span class="bc-name">${esc(aN)}</span>${aSc}</div>
    </div>
    <div class="bc-trophy">🏆</div>
  </div>`;

  let html = '<div class="bracket-outer"><div class="bracket-wrap" id="bcWrap">';
  html += '<div class="bc-half left">';
  if (lR16.length) html += colHtml(lR16, lR16B);
  if (lQF.length)  html += colHtml(lQF,  lQFB);
  if (lSF.length)  html += colHtml(lSF,  lSFB);
  html += '</div>';
  html += finalHtml;
  html += '<div class="bc-half right">';
  if (rSF.length)  html += colHtml(rSF,  rSFB);
  if (rQF.length)  html += colHtml(rQF,  rQFB);
  if (rR16.length) html += colHtml(rR16, rR16B);
  html += '</div>';
  html += '<svg class="bc-svg" id="bcSvg"></svg>';
  html += '</div></div>';
  return html;
}

function drawBracketLines() {
  const wrap = document.getElementById('bcWrap');
  const svg  = document.getElementById('bcSvg');
  if (!wrap || !svg) return;
  const wr = wrap.getBoundingClientRect();
  if (wr.width === 0) { requestAnimationFrame(drawBracketLines); return; }
  svg.innerHTML = '';

  const STROKE = '#cbd5e1';
  function ln(x1,y1,x2,y2) {
    const el = document.createElementNS('http://www.w3.org/2000/svg','line');
    el.setAttribute('x1',x1.toFixed(1)); el.setAttribute('y1',y1.toFixed(1));
    el.setAttribute('x2',x2.toFixed(1)); el.setAttribute('y2',y2.toFixed(1));
    el.setAttribute('stroke',STROKE); el.setAttribute('stroke-width','1.5');
    svg.appendChild(el);
  }

  for (const conn of _bracketConns) {
    const tEl = wrap.querySelector(`[data-bid="${conn.tgt}"]`);
    if (!tEl) continue;
    const tr = tEl.getBoundingClientRect();
    const tY = tr.top + tr.height/2 - wr.top;
    const s1El = conn.src1 ? wrap.querySelector(`[data-bid="${conn.src1}"]`) : null;
    const s2El = conn.src2 ? wrap.querySelector(`[data-bid="${conn.src2}"]`) : null;
    if (!s1El && !s2El) continue;

    if (conn.side === 'left') {
      const tX = tr.left - wr.left;
      if (s1El && s2El) {
        const r1=s1El.getBoundingClientRect(), r2=s2El.getBoundingClientRect();
        const y1=r1.top+r1.height/2-wr.top, y2=r2.top+r2.height/2-wr.top;
        const x1=r1.right-wr.left, x2=r2.right-wr.left;
        const xb=(Math.max(x1,x2)+tX)/2;
        ln(x1,y1,xb,y1); ln(x2,y2,xb,y2); ln(xb,y1,xb,y2); ln(xb,(y1+y2)/2,tX,tY);
      } else {
        const e=(s1El||s2El).getBoundingClientRect();
        ln(e.right-wr.left, e.top+e.height/2-wr.top, tX, tY);
      }
    } else {
      const tX = tr.right - wr.left;
      if (s1El && s2El) {
        const r1=s1El.getBoundingClientRect(), r2=s2El.getBoundingClientRect();
        const y1=r1.top+r1.height/2-wr.top, y2=r2.top+r2.height/2-wr.top;
        const x1=r1.left-wr.left, x2=r2.left-wr.left;
        const xb=(Math.min(x1,x2)+tX)/2;
        ln(x1,y1,xb,y1); ln(x2,y2,xb,y2); ln(xb,y1,xb,y2); ln(xb,(y1+y2)/2,tX,tY);
      } else {
        const e=(s1El||s2El).getBoundingClientRect();
        ln(e.left-wr.left, e.top+e.height/2-wr.top, tX, tY);
      }
    }
  }
}

/* ════════════════════════════════════════
   ③ 得点ランキング — 取得・描画
════════════════════════════════════════ */
async function fetchScorers(code) {
  const season = currentSeason();
  const res    = await fetch(`${ESPN_CORE}/${code}/seasons/${season}/types/1/leaders`);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();

  const goalsCat   = data.categories?.find(c => c.name === 'goalsLeaders');
  const assistsCat = data.categories?.find(c => c.name === 'assistsLeaders');
  const gLeaders   = (goalsCat?.leaders   || []).slice(0, TOP_N);
  const aLeaders   = (assistsCat?.leaders || []).slice(0, TOP_N);

  // 選手IDを収集して一括フェッチ
  const allL   = [...gLeaders, ...aLeaders];
  const aidSet = new Set(allL.map(l => extractId(l.athlete?.['$ref'], 'athletes')).filter(Boolean));
  const athMap = {};

  await Promise.all([...aidSet].map(async id => {
    try {
      const r = await fetch(`${ESPN_CORE}/${code}/seasons/${season}/athletes/${id}?lang=ja&region=jp`);
      if (r.ok) {
        const a = await r.json();
        athMap[id] = {
          nameEn: a.displayName || a.shortName || '?',
          name:   playerNameJa(a.displayName || a.shortName || '?'),
          teamId: extractId(a.team?.['$ref'], 'teams'),
        };
      }
    } catch {}
  }));

  function buildList(leaders) {
    const list = leaders.map((l, i) => {
      const aid  = extractId(l.athlete?.['$ref'], 'athletes');
      const ath  = athMap[aid] || {};
      const tid  = extractId(l.team?.['$ref'], 'teams') || ath.teamId;
      const mmt  = (l.displayValue || '').match(/Matches:\s*(\d+)/);
      return {
        rank:     0,
        name:     ath.name   || '?',
        nameEn:   ath.nameEn || '',
        teamLogo: tid ? `https://a.espncdn.com/i/teamlogos/soccer/500/${tid}.png` : null,
        value:    Math.round(l.value),
        matches:  mmt ? parseInt(mmt[1]) : 0,
      };
    });
    // 同値同順位（例: 8点が2人なら両者2位、次は4位）
    for (let i = 0; i < list.length; i++) {
      list[i].rank = (i > 0 && list[i].value === list[i-1].value)
        ? list[i-1].rank
        : i + 1;
    }
    return list;
  }

  return { goals: buildList(gLeaders), assists: buildList(aLeaders) };
}

async function loadScorers(code, showLoader = true) {
  const wrap = document.getElementById('scorersWrap');
  if (scorersCache[code]) { renderScorers(scorersCache[code], code); return; }
  if (showLoader) wrap.innerHTML = `<div class="state"><span class="ico">⚽</span>${T.loading}</div>`;
  try {
    const data = await fetchScorers(code);
    scorersCache[code] = data;
    renderScorers(data, code);
    // 未登録選手をバックグラウンドでWikipedia検索
    const all = [...data.goals, ...data.assists];
    const seen = new Set();
    const unregistered = all.filter(p => {
      if (!p.nameEn || seen.has(p.nameEn)) return false;
      seen.add(p.nameEn);
      return !nameOverrides.players[p.nameEn] && !PLAYER_NAMES_JA[p.nameEn];
    });
    if (unregistered.length) autoLookupPlayers(unregistered, code);
  } catch(e) {
    wrap.innerHTML = `<div class="state"><span class="ico">⚠️</span>${T.failed}: ${esc(e.message)}</div>`;
  }
}

// 未登録選手を1人ずつWikipedia検索してキャッシュに保存・再描画
async function autoLookupPlayers(players, code) {
  if (LANG !== 'ja') return;
  let updated = false;
  for (const p of players) {
    if (nameOverrides.players[p.nameEn] || PLAYER_NAMES_JA[p.nameEn]) continue;
    try {
      const ja = await lookupWikipediaJa(p.nameEn);
      if (ja) {
        nameOverrides.players[p.nameEn] = ja;
        updated = true;
        // キャッシュの選手名を更新
        if (scorersCache[code]) {
          for (const list of [scorersCache[code].goals, scorersCache[code].assists]) {
            list.forEach(pl => { if (pl.nameEn === p.nameEn) pl.name = ja; });
          }
        }
        // 表示中なら再描画
        if (activePage === 'scorers' && activeScorersCode === code) {
          renderScorers(scorersCache[code], code);
        }
      }
    } catch {}
    await new Promise(r => setTimeout(r, 800)); // 800ms間隔でリクエスト
  }
  if (updated) {
    try { localStorage.setItem('nameOverrides', JSON.stringify(nameOverrides)); } catch {}
  }
}

function renderScorers(data, code) {
  const wrap  = document.getElementById('scorersWrap');
  const lname = SCORERS_LEAGUES.find(l => l.code === code)?.label ?? '';
  const players = activeScorersTab === 'goals' ? data.goals : data.assists;

      <button class="scorer-sub${activeScorersTab==='goals'?' active':''}" data-sub="goals">⚽ ${T.goals}</button>
      <button class="scorer-sub${activeScorersTab==='assists'?' active':''}" data-sub="assists">🎯 ${T.assists}</button>
    </div>
    ${scorerTable(players, colLabel)}`;
}

function rankStyle(rank) {
  if (rank === 1) return 'color:#f59e0b;font-weight:900;font-size:15px';
  if (rank === 2) return 'color:#94a3b8;font-weight:800;font-size:14px';
  if (rank === 3) return 'color:#b45309;font-weight:800;font-size:14px';
  return 'color:var(--muted);font-weight:700;font-size:13px';
}

function nameStyle(rank) {
  if (rank === 1) return 'color:#d97706;font-weight:700;font-size:14px';
  if (rank === 2) return 'color:#64748b;font-weight:600;font-size:13px';
  if (rank === 3) return 'color:#92400e;font-weight:600;font-size:13px';
  return 'color:var(--text);font-weight:500;font-size:13px';
}

function scorerTable(players, colLabel) {
  if (!players.length) return '<p style="color:var(--muted);font-size:13px;padding:8px 0">データなし</p>';
  const rows = players.map(p => {
    const tl = p.teamLogo ? `<img class="badge" src="${attr(p.teamLogo)}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
    const nameCell = adminMode && p.nameEn
      ? `<span class="admin-name" data-en="${attr(p.nameEn)}" title="クリックで編集">${esc(p.name)}</span>`
      : esc(p.name);
    return `<tr>
      <td class="stnd-rank" style="${rankStyle(p.rank)}">${p.rank}</td>
      <td style="${nameStyle(p.rank)};padding:8px 10px">${nameCell}</td>
      <td class="stnd-num hide-sm">${tl}</td>
      <td class="stnd-num hide-sm">${p.matches}</td>
      <td class="stat-val">${p.value}</td>
    </tr>`;
  }).join('');
  return `<table class="tbl stnd">
    <thead><tr>
      <th class="c" style="width:28px"></th>
      <th class="l">${T.player}</th>
      <th class="c hide-sm" style="width:36px">${T.team}</th>
      <th class="c hide-sm" style="width:36px">${T.pCol}</th>
      <th class="c" style="width:52px">${esc(colLabel)}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

/* ════════════════════════════════════════
   Wikipedia 日本語名検索
════════════════════════════════════════ */
async function lookupWikipediaJa(name) {
  const wpApi = 'https://en.wikipedia.org/w/api.php';
  const wdApi = 'https://www.wikidata.org/w/api.php';
  const llq   = '&prop=langlinks&lllang=ja&format=json&origin=*';

  // Unicode escape で発音符号除去（š→s, ö→o, á→a 等）
  function norm(s) {
    return String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
  }
  const nameParts = norm(name).split(/\s+/).filter(w => w.length > 1);
  function matches(title) {
    const t = norm(title);
    return nameParts.every(p => t.includes(p));
  }

  function firstJa(pages) {
    for (const p of Object.values(pages || {})) {
      if (p.pageid > 0 && matches(p.title)) {
        const ja = p.langlinks?.find(l => l.lang === 'ja')?.['*'];
        if (ja) return ja;
      }
    }
    return null;
  }
  async function wpFetch(titles) {
    try {
      const r = await fetch(`${wpApi}?action=query&titles=${encodeURIComponent(titles)}${llq}`);
      return r.ok ? firstJa((await r.json()).query?.pages) : null;
    } catch { return null; }
  }
  async function wpSearch(q, n = 5) {
    try {
      const r = await fetch(`${wpApi}?action=query&list=search&srsearch=${encodeURIComponent(q)}&srlimit=${n}&srnamespace=0&format=json&origin=*`);
      return r.ok ? ((await r.json()).query?.search || []).map(h => h.title).join('|') : '';
    } catch { return ''; }
  }

  // 試み①〜④: 英語Wikipedia → 日本語langlink
  const ja1 = await wpFetch(name);
  if (ja1) return ja1;

  const t2 = await wpSearch(name, 5);
  if (t2) { const ja2 = await wpFetch(t2); if (ja2) return ja2; }

  const t3 = await wpSearch(name + ' footballer', 3);
  if (t3) { const ja3 = await wpFetch(t3); if (ja3) return ja3; }

  const t4 = await wpSearch(name + ' football club', 3);
  if (t4) { const ja4 = await wpFetch(t4); if (ja4) return ja4; }

  // 試み⑤: Wikidata 日本語ラベル
  // 英語Wikipedia ↔ 日本語Wikipedia の対応がない選手でも
  // Wikidata には日本語ラベル（表記）が登録されていることが多い
  try {
    const r5 = await fetch(
      `${wdApi}?action=wbsearchentities&search=${encodeURIComponent(name)}&language=en&type=item&limit=5&format=json&origin=*`
    );
    if (r5.ok) {
      const items = (await r5.json()).search || [];
      for (const item of items) {
        if (!matches(item.label || '')) continue;
        const r6 = await fetch(
          `${wdApi}?action=wbgetentities&ids=${encodeURIComponent(item.id)}&languages=ja&props=labels%7Csitelinks&sitefilter=jawiki&format=json&origin=*`
        );
        if (!r6.ok) continue;
        const ent = (await r6.json()).entities?.[item.id];
        const jaTitle = ent?.sitelinks?.jawiki?.title;
        if (jaTitle) return jaTitle;
        const jaLabel = ent?.labels?.ja?.value;
        if (jaLabel) return jaLabel;
      }
    }
  } catch {}

  return null;
}

  if (!on && activePage === 'edit') showPage('schedule');
  // 現在ページを再描画（編集ハンドル付け外し）
  if (activePage === 'scorers' && scorersCache[activeScorersCode]) {
    renderScorers(scorersCache[activeScorersCode], activeScorersCode);
  } else if (activePage === 'standings') {
    const lname = STANDINGS_LEAGUES.find(l => l.code === activeStandCode)?.label ?? activeStandCode;
    if (CUP_KO_CODES.has(activeStandCode))
      renderCupPage(standingsCache[activeStandCode]||[], koCache[activeStandCode]||[], lname);
    else if (standingsCache[activeStandCode])
      renderStandings(standingsCache[activeStandCode], activeStandCode);
  }
}

// 管理者：選手名クリックでポップアップ編集
(function() {
  const popup  = document.getElementById('adminPopup');
  const enDiv  = document.getElementById('adminPopupEn');
  const inp    = document.getElementById('adminPopupInput');
  const save   = document.getElementById('adminPopupSave');
  const cancel = document.getElementById('adminPopupCancel');
  let currentEn = '', currentType = 'player';

  document.body.addEventListener('click', e => {
    if (!adminMode) return;
    const el = e.target.closest('.admin-name');
    if (!el) return;
    currentEn   = el.dataset.en;
    currentType = el.dataset.type || 'player';
    const jaBase = currentType === 'team'
      ? (TEAM_NAMES_JA[currentEn] || currentEn)
      : (PLAYER_NAMES_JA[currentEn] || currentEn);
    const override = currentType === 'team'
      ? nameOverrides.teams[currentEn]
      : nameOverrides.players[currentEn];
    document.getElementById('adminPopupLabel').textContent =
      currentType === 'team' ? 'クラブ名を編集' : '選手名を編集';
    enDiv.textContent = currentEn;
    inp.value = override || jaBase;
    popup.classList.add('open');
    inp.focus();
    inp.select();
  });

  function closePopup() { popup.classList.remove('open'); currentEn = ''; }

  save.addEventListener('click', () => {
    if (!currentEn) return;
    const val = inp.value.trim();
    if (!val) return;
    const jaBase = currentType === 'team'
      ? (TEAM_NAMES_JA[currentEn] || currentEn)
      : (PLAYER_NAMES_JA[currentEn] || currentEn);
    const map = currentType === 'team' ? nameOverrides.teams : nameOverrides.players;
    if (val !== jaBase) map[currentEn] = val;
    else delete map[currentEn];
    try { localStorage.setItem('nameOverrides', JSON.stringify(nameOverrides)); } catch {}
    closePopup();
    if (currentType === 'player') {
      // 選手キャッシュをクリアして再描画
      delete scorersCache[activeScorersCode];
      loadScorers(activeScorersCode, false);
    } else {
      // チーム名変更 → ノックアウト再描画
      Object.keys(koCache).forEach(k => delete koCache[k]);
      if (activePage === 'standings') loadStandings(activeStandCode, false);
    }
  });

  // Wikipedia検索ボタン
  const wikiBtn    = document.getElementById('adminWikiBtn');
  const wikiStatus = document.getElementById('adminWikiStatus');
  wikiBtn.addEventListener('click', async () => {
    if (!currentEn) return;
    wikiBtn.textContent = '検索中…';
    wikiBtn.style.opacity = '.5';
    wikiStatus.textContent = '';
    const ja = await lookupWikipediaJa(currentEn);
    wikiBtn.textContent = 'W検索';
    wikiBtn.style.opacity = '';
    if (ja) {
      inp.value = ja;
      wikiStatus.textContent = '✓ Wikipedia: ' + ja;
      wikiStatus.style.color = '#10b981';
    } else {
      wikiStatus.textContent = '見つかりませんでした';
      wikiStatus.style.color = '#ef4444';
    }
  });

  inp.addEventListener('keydown', e => { if (e.key === 'Enter') save.click(); if (e.key === 'Escape') closePopup(); });
  cancel.addEventListener('click', closePopup);
  popup.addEventListener('click', e => { if (e.target === popup) closePopup(); });
})();

/* ════════════════════════════════════════
   名前編集ページ
════════════════════════════════════════ */
let editPageInited = false;

function initEditPage() {
  if (editPageInited) return;
  editPageInited = true;

  function buildRows(map, overrides) {
    let html = '';
    for (const [en, jaBase] of Object.entries(map)) {
      const ja      = overrides[en] ?? jaBase;
      const changed = overrides[en] ? ' changed' : '';
      html += `<tr data-en="${attr(en)}" data-base="${attr(jaBase)}">` +
              `<td>${esc(en)}</td>` +
              `<td style="display:flex;gap:4px;align-items:center">` +
              `<input class="edit-inp${changed}" type="text" value="${attr(ja)}" style="flex:1">` +
              `<button class="wiki-btn" data-en="${attr(en)}" title="Wikipediaで日本語名を検索">W</button>` +
              `</td>` +
              `</tr>`;
    }
    return html;
  }

  document.getElementById('teamEditBody').innerHTML   = buildRows(TEAM_NAMES_JA,   nameOverrides.teams);
  document.getElementById('playerEditBody').innerHTML = buildRows(PLAYER_NAMES_JA, nameOverrides.players);
  document.getElementById('teamEditCnt').textContent   = Object.keys(TEAM_NAMES_JA).length   + '件';
  document.getElementById('playerEditCnt').textContent = Object.keys(PLAYER_NAMES_JA).length + '件';

  // 変更ハイライト
  document.querySelectorAll('#teamEditBody input, #playerEditBody input').forEach(inp => {
    inp.addEventListener('input', () => {
      inp.classList.toggle('changed', inp.value !== inp.closest('tr').dataset.base);
    });
  });

  // 行ごとのWikipedia検索ボタン
  document.querySelectorAll('#teamEditBody .wiki-btn, #playerEditBody .wiki-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const en  = btn.dataset.en;
      const inp = btn.closest('tr').querySelector('input');
      btn.textContent = '…';
      btn.classList.add('loading');
      const ja = await lookupWikipediaJa(en);
      btn.textContent = 'W';
      btn.classList.remove('loading');
      if (ja) {
        inp.value = ja;
        inp.classList.toggle('changed', ja !== btn.closest('tr').dataset.base);
        inp.style.borderColor = '#10b981';
        setTimeout(() => { inp.style.borderColor = ''; }, 1500);
      } else {
        btn.title = '見つかりませんでした';
        btn.style.color = '#ef4444';
        setTimeout(() => { btn.style.color = ''; btn.title = 'Wikipediaで日本語名を検索'; }, 2000);
      }
    });
  });

  // 検索フィルター
  function bindSearch(searchId, tbodyId) {
    document.getElementById(searchId).addEventListener('input', function() {
      const q = this.value.toLowerCase();
      document.querySelectorAll(`#${tbodyId} tr`).forEach(tr => {
        tr.style.display = (!q
          || tr.dataset.en.toLowerCase().includes(q)
          || tr.querySelector('input').value.toLowerCase().includes(q))
          ? '' : 'none';
      });
    });
  }
  bindSearch('teamSearch',   'teamEditBody');
  bindSearch('playerSearch', 'playerEditBody');

  // 保存
  document.getElementById('editSaveBtn').addEventListener('click', () => {
    const teams = {}, players = {};
    document.querySelectorAll('#teamEditBody tr').forEach(tr => {
      const val = tr.querySelector('input').value.trim();
      if (val && val !== tr.dataset.base) teams[tr.dataset.en] = val;
    });
    document.querySelectorAll('#playerEditBody tr').forEach(tr => {
      const val = tr.querySelector('input').value.trim();
      if (val && val !== tr.dataset.base) players[tr.dataset.en] = val;
    });
    nameOverrides = { teams, players };
    try { localStorage.setItem('nameOverrides', JSON.stringify(nameOverrides)); } catch {}
    const total = Object.keys(teams).length + Object.keys(players).length;
    const msg = document.getElementById('editSaved');
    msg.textContent = T.saved + total + T.savedSuffix;
    setTimeout(() => { msg.textContent = ''; }, 3000);
  });
}

function showPage(page) {
  if (page === 'edit' && !adminMode) return;   // 管理者以外はアクセス不可
  activePage = page;
  document.getElementById('schedulePage').style.display  = page==='schedule'  ? '' : 'none';
  document.getElementById('standingsPage').style.display = page==='standings' ? '' : 'none';
  document.getElementById('scorersPage').style.display   = page==='scorers'   ? '' : 'none';
  document.getElementById('editPage').style.display      = page==='edit'      ? '' : 'none';
  document.querySelectorAll('.pnav').forEach(b => b.classList.toggle('active', b.dataset.page===page));
  if (page==='standings' && !standingsCache[activeStandCode])   loadStandings(activeStandCode);
  if (page==='scorers'   && !scorersCache[activeScorersCode])   loadScorers(activeScorersCode);
  if (page==='edit') initEditPage();
}
document.querySelectorAll('.pnav').forEach(btn => { btn.onclick = () => showPage(btn.dataset.page); });

/* ════════════════════════════════════════
   ロード・自動更新（全ページ共通 3分）
════════════════════════════════════════ */
async function load(showLoader = false) {
  const btn = document.getElementById('reloadBtn');
  btn.classList.add('spin');
  if (showLoader) document.getElementById('scheduleWrap').innerHTML = `<div class="state"><span class="ico">⚽</span>${T.loading}</div>`;
  try {
    allMatches = await fetchSchedule();
    buildCountryFilter();
    renderSchedule();
    markUpdated();
  } catch(e) {
    document.getElementById('scheduleWrap').innerHTML = `<div class="state"><span class="ico">⚠️</span>${T.failed}: ${esc(e.message)}</div>`;
  } finally { btn.classList.remove('spin'); }
  scheduleNextRefresh();
}

function scheduleNextRefresh() {
  clearTimeout(timer);
  const hasLive = allMatches.some(m => m.state === 'in');
  const interval = hasLive ? REFRESH_LIVE : REFRESH_IDLE;
  timer = setTimeout(async () => {
    await load(false);
    scheduleNextRefresh();
  }, interval);
}

function startAutoRefresh() {
  scheduleNextRefresh();
}

/* ════════════════════════════════════════
   起動
════════════════════════════════════════ */
document.getElementById('reloadBtn').onclick = () => { load(true).then(() => scheduleNextRefresh()); };

/* スクロールで上バナーを隠す（モバイルのみ） */
(function() {
  let lastY = 0, ticking = false;
  window.addEventListener('scroll', () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const y = window.scrollY;
      if (y > lastY && y > 60) {
        document.body.classList.add('header-hidden');
      } else if (y <= 10) {
        document.body.classList.remove('header-hidden');
      }
      lastY = y;
      ticking = false;
    });
  }, { passive: true });
})();
